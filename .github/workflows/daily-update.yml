name: HR 데일리 뉴스 자동 업데이트

on:
  schedule:
    - cron: '0 0 * * *'   # 매일 00:00 UTC = 오전 9시 KST
  workflow_dispatch:        # GitHub에서 수동 실행 버튼도 제공

jobs:
  update-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # data.json 커밋을 위해 필요

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 20 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: HR 뉴스 데이터 수집
        run: node update-news.mjs

      - name: data.json 커밋 & 푸시
        run: |
          git config user.name  "HR Daily Bot"
          git config user.email "action@github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "ℹ️  변경사항 없음 — 커밋 생략"
          else
            git commit -m "📰 $(date +'%Y-%m-%d') HR 데일리 업데이트"
            git push
          fi
