name: HR 데일리 뉴스 자동 업데이트

on:
  schedule:
    - cron: '0 23 * * *'   # 매일 23:00 UTC = 오전 8시 KST (다음날)
  workflow_dispatch:        # GitHub에서 수동 실행 버튼

jobs:
  update-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 20 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: HR 뉴스 수집 & AI 요약 생성
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node update-news.mjs

      - name: data.json 커밋 & 푸시
        run: |
          git config user.name  "HR Daily Bot"
          git config user.email "action@github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "ℹ️  변경사항 없음"
          else
            git commit -m "📰 $(date +'%Y-%m-%d') HR 데일리 업데이트"
            git push
          fi
